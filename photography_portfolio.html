<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#111;--text:#e8e8e8;--muted:#666;--accent:#fff;--border:#222}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;overflow-x:hidden}

/* GRAIN OVERLAY */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.045;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px 128px}

/* PAGE TRANSITION */
#transition{position:fixed;inset:0;background:#0a0a0a;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.35s ease}
#transition.fade-in{opacity:1}
#transition.fade-out{opacity:0}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem}
.nav-logo{font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;cursor:pointer}
.nav-links{display:flex;gap:2rem}
.nav-links a{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}

/* PAGES */
.page{display:none;min-height:100vh}
.page.active{display:flex}

/* HERO */
#home{flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,#1a1a1a 0%,#0a0a0a 70%);z-index:0}
.hero-content{position:relative;z-index:1;padding:2rem}
.hero-tagline{font-size:clamp(2rem,5vw,4rem);font-weight:200;letter-spacing:0.05em;line-height:1.2;color:var(--accent);margin-bottom:1rem}
.hero-sub{font-size:0.85rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:3rem}
.hero-cta{display:inline-block;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:0.8rem 2rem;cursor:pointer;transition:all 0.3s;text-decoration:none}
.hero-cta:hover{color:var(--accent);border-color:#555}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* GALLERY */
#gallery{flex-direction:column;padding-top:6rem;min-height:100vh}
.gallery-header{padding:2rem 3rem 1rem;border-bottom:1px solid var(--border)}
.gallery-header h2{font-size:0.7rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);font-weight:400}
.filter-bar{display:flex;gap:1.5rem;padding:1.2rem 3rem;border-bottom:1px solid var(--border)}
.filter-btn{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;transition:color 0.3s;padding:0}
.filter-btn:hover,.filter-btn.active{color:var(--accent)}

/* UNIFORM GRID */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
@media(max-width:768px){.photo-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.photo-grid{grid-template-columns:1fr}}

.photo-item{position:relative;overflow:hidden;cursor:pointer;background:var(--bg2);aspect-ratio:4/5}
.photo-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease,filter 0.5s ease;filter:brightness(0.8);opacity:0}
.photo-item img.loaded{animation:blurup 0.6s ease forwards}
@keyframes blurup{from{opacity:0;filter:brightness(0.8) blur(12px)}to{opacity:1;filter:brightness(0.85) blur(0)}}
.photo-item:hover img{transform:scale(1.04);filter:brightness(1)}
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 0.3s;display:flex;align-items:flex-end;padding:1rem}
.photo-item:hover .photo-overlay{background:rgba(0,0,0,0.15)}
.photo-label{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0);transition:color 0.3s}
.photo-item:hover .photo-label{color:rgba(255,255,255,0.55)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:200;justify-content:center;align-items:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.lb-close{position:absolute;top:1.5rem;right:2rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:none;transition:color 0.3s}
.lb-close:hover{color:var(--accent)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;padding:1rem;transition:color 0.3s}
.lb-nav:hover{color:var(--accent)}
.lb-prev{left:1rem}
.lb-next{right:1rem}

/* FOOTER */
footer{padding:2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.footer-links{display:flex;gap:1.5rem}
.footer-links a{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.65rem;letter-spacing:0.15em;color:var(--border)}

.fade-in-el{opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-in-el.visible{opacity:1;transform:none}
</style>
</head>
<body>

<div id="transition"></div>

<nav>
  <span class="nav-logo" onclick="showPage('home')">— portfolio</span>
  <div class="nav-links">
    <a onclick="showPage('home')" id="nav-home" class="active">home</a>
    <a onclick="showPage('gallery')" id="nav-gallery">gallery</a>
  </div>
</nav>

<!-- HOME -->
<div class="page active" id="home">
  <div class="hero-bg"></div>
  <div class="hero-content fade-in-el">
    <p class="hero-sub">Photography</p>
    <h1 class="hero-tagline">Light exists<br>in the dark too.</h1>
    <a class="hero-cta" onclick="showPage('gallery')">View Work</a>
  </div>
  <div class="scroll-hint">— enter</div>
</div>

<!-- GALLERY -->
<div class="page" id="gallery">
  <div class="gallery-header">
    <h2>Selected Work</h2>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGallery('all',this)">All</button>
    <button class="filter-btn" onclick="filterGallery('landscape',this)">Landscape</button>
    <button class="filter-btn" onclick="filterGallery('portrait',this)">Portrait</button>
    <button class="filter-btn" onclick="filterGallery('street',this)">Street</button>
  </div>
  <div class="photo-grid" id="grid"></div>
  <footer>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">500px</a>
      <a href="#">Contact</a>
    </div>
    <span class="footer-copy">&copy; 2026</span>
  </footer>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕ close</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8592;</button>
  <img id="lb-img" src="" alt=""/>
  <button class="lb-nav lb-next" onclick="lbNav(1)">&#8594;</button>
</div>

<script>
const photos=[
  {src:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',cat:'landscape',label:'mountain fog'},
  {src:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800&q=80',cat:'portrait',label:'dusk light'},
  {src:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80',cat:'street',label:'city night'},
  {src:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=800&q=80',cat:'landscape',label:'pine ridge'},
  {src:'https://images.unsplash.com/photo-1520637836862-4d197d17c35a?w=800&q=80',cat:'portrait',label:'shadow study'},
  {src:'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800&q=80',cat:'street',label:'underground'},
  {src:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80',cat:'landscape',label:'aerial coast'},
  {src:'https://images.unsplash.com/photo-1534330207526-8e81f10ec6fc?w=800&q=80',cat:'portrait',label:'still'},
  {src:'https://images.unsplash.com/photo-1444723121867-7a241cacace9?w=800&q=80',cat:'street',label:'rainy avenue'},
];

let currentFilter='all';
let lbIdx=0;
let visible=[];

function buildGrid(filter){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  visible=photos.filter(p=>filter==='all'||p.cat===filter);
  visible.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='photo-item';
    const img=document.createElement('img');
    img.alt=p.label;
    img.onload=()=>img.classList.add('loaded');
    img.src=p.src;
    const overlay=document.createElement('div');
    overlay.className='photo-overlay';
    overlay.innerHTML=`<span class="photo-label">${p.label}</span>`;
    div.appendChild(img);
    div.appendChild(overlay);
    div.onclick=()=>openLb(i);
    grid.appendChild(div);
  });
}

function filterGallery(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildGrid(cat);
}

function openLb(i){
  lbIdx=i;
  document.getElementById('lb-img').src=visible[i].src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb(){document.getElementById('lightbox').classList.remove('open')}
function lbNav(dir){
  lbIdx=(lbIdx+dir+visible.length)%visible.length;
  document.getElementById('lb-img').src=visible[lbIdx].src;
}

function showPage(id){
  const tr=document.getElementById('transition');
  tr.style.transition='opacity 0.3s ease';
  tr.style.opacity='1';
  setTimeout(()=>{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
    document.getElementById('nav-'+id).classList.add('active');
    if(id==='gallery')buildGrid(currentFilter);
    if(id==='home'){
      const el=document.querySelector('#home .fade-in-el');
      el.classList.remove('visible');
      setTimeout(()=>el.classList.add('visible'),100);
    }
    window.scrollTo(0,0);
    tr.style.opacity='0';
  },320);
}

document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLb()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
});

setTimeout(()=>document.querySelector('#home .fade-in-el').classList.add('visible'),200);
</script>
</body>
</html>
