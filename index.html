<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#111;--text:#e8e8e8;--muted:#666;--accent:#fff;--border:#222}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;overflow-x:hidden}

#grain-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.055}

#transition{position:fixed;inset:0;background:#0a0a0a;z-index:500;pointer-events:none;opacity:0;transition:opacity 0.35s ease}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem}
.nav-logo{font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;cursor:pointer}
.nav-links{display:flex;gap:2rem}
.nav-links a{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}

.page{display:none;min-height:100vh}
.page.active{display:flex}

#home{flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}
#particle-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-content{position:relative;z-index:1;padding:2rem}
.hero-tagline{font-size:clamp(2rem,5vw,4rem);font-weight:200;letter-spacing:0.05em;line-height:1.2;color:var(--accent);margin-bottom:1rem}
.hero-sub{font-size:0.85rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:3rem}
.hero-cta{display:inline-block;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:0.8rem 2rem;cursor:pointer;transition:all 0.3s;text-decoration:none}
.hero-cta:hover{color:var(--accent);border-color:#555}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

#gallery{flex-direction:column;padding-top:6rem;min-height:100vh}
.gallery-header{padding:2rem 3rem 1rem;border-bottom:1px solid var(--border)}
.gallery-header h2{font-size:0.7rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--muted);font-weight:400}
.filter-bar{display:flex;gap:1.5rem;padding:1.2rem 3rem;border-bottom:1px solid var(--border)}
.filter-btn{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;transition:color 0.3s;padding:0}
.filter-btn:hover,.filter-btn.active{color:var(--accent)}

.photo-grid{columns:4;column-gap:12px;padding:2rem 8rem}
@media(max-width:1024px){.photo-grid{columns:3;padding:1.5rem 4rem}}
@media(max-width:768px){.photo-grid{columns:2;padding:1rem 2rem}}
@media(max-width:480px){.photo-grid{columns:1;padding:1rem}}

/* SCROLL FADE IN */
.photo-item{break-inside:avoid;margin-bottom:12px;display:block;position:relative;overflow:hidden;cursor:pointer;background:var(--bg2);
  opacity:0;transform:translateY(30px);transition:opacity 0.6s ease, transform 0.6s ease}
.photo-item.visible{opacity:1;transform:translateY(0)}

.photo-item img{display:block;width:100%;height:auto;transition:transform 0.6s ease,filter 0.5s ease;filter:brightness(0.8);opacity:0}
.photo-item img.loaded{animation:blurup 0.6s ease forwards}
@keyframes blurup{from{opacity:0;filter:brightness(0.8) blur(12px)}to{opacity:1;filter:brightness(0.85) blur(0)}}

/* HOVER OVERLAY */
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background 0.4s;display:flex;align-items:flex-end;padding:1rem}
.photo-item:hover .photo-overlay{background:rgba(0,0,0,0.25)}
.photo-label{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0);transition:color 0.3s;transform:translateY(4px);transition:color 0.3s,transform 0.3s}
.photo-item:hover .photo-label{color:rgba(255,255,255,0.6);transform:translateY(0)}
.photo-item:hover img{transform:scale(1.03);filter:brightness(1)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;justify-content:center;align-items:center;transition:background 0.4s ease}
.lightbox.open{display:flex;background:rgba(0,0,0,0.96)}
.lightbox-inner{opacity:0;transform:scale(0.92);transition:opacity 0.4s ease,transform 0.4s ease;display:flex;justify-content:center;align-items:center;max-width:90vw;max-height:90vh}
.lightbox.open .lightbox-inner{opacity:1;transform:scale(1)}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;display:block}
.lb-close{position:absolute;top:1.5rem;right:2rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:none;transition:color 0.3s}
.lb-close:hover{color:var(--accent)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;padding:1rem;transition:color 0.3s,opacity 0.3s;opacity:0.5}
.lb-nav:hover{color:var(--accent);opacity:1}
.lb-prev{left:1rem}
.lb-next{right:1rem}
.lb-counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:0.25em;color:var(--muted)}

/* CONTACT POPUP */
.contact-popup{position:fixed;bottom:4rem;right:3rem;left:auto;background:#161616;border:1px solid var(--border);padding:1.5rem 2rem;z-index:300;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity 0.3s ease,transform 0.3s ease}
.contact-popup.open{opacity:1;pointer-events:all;transform:translateY(0)}
.contact-popup p{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.contact-popup a{font-size:0.85rem;color:var(--text);text-decoration:none;letter-spacing:0.05em;transition:color 0.3s}
.contact-popup a:hover{color:var(--accent)}border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.footer-links{display:flex;gap:1.5rem}
.footer-links a{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.65rem;letter-spacing:0.15em;color:var(--border)}

.fade-in-el{opacity:0;transform:translateY(16px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-in-el.visible{opacity:1;transform:none}
</style>
</head>
<body>

<div id="transition"></div>

<nav>
  <span class="nav-logo" onclick="showPage('home')">— portfolio</span>
  <div class="nav-links">
    <a onclick="showPage('home')" id="nav-home" class="active">home</a>
    <a onclick="showPage('gallery')" id="nav-gallery">gallery</a>
  </div>
</nav>

<canvas id="grain-canvas"></canvas>

<div class="page active" id="home">
  <canvas id="particle-canvas"></canvas>
  <div class="hero-bg"></div>
  <div class="hero-content fade-in-el">
    <p class="hero-sub">Photography</p>
    <h1 class="hero-tagline">Light exists<br>in the dark too.</h1>
    <a class="hero-cta" onclick="showPage('gallery')">View Work</a>
  </div>
  <div class="scroll-hint">— enter</div>
</div>

<div class="page" id="gallery">
  <div class="gallery-header"><h2>Selected Work</h2></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGallery('all',this)">All</button>
    <button class="filter-btn" onclick="filterGallery('Macro',this)">Macro</button>
    <button class="filter-btn" onclick="filterGallery('Travel',this)">Travel</button>
    <button class="filter-btn" onclick="filterGallery('Long-exposure',this)">Long Exposure</button>
  </div>
  <div class="photo-grid" id="grid"></div>
  <footer>
    <div class="footer-links">
      <a href="https://www.instagram.com/jungssup/" target="_blank">Instagram</a>
      <a onclick="event.stopPropagation();toggleContact()" style="cursor:pointer">Contact</a>
    </div>
    <span class="footer-copy">&copy; 2026</span>
  </footer>
</div>

<div class="contact-popup" id="contactPopup">
  <p>Get in touch</p>
  <a href="mailto:jungsup.kim17@gmail.com">jungsup.kim17@gmail.com</a>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕ close</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8592;</button>
  <div class="lightbox-inner"><img id="lb-img" src="" alt=""/></div>
  <button class="lb-nav lb-next" onclick="lbNav(1)">&#8594;</button>
  <span class="lb-counter" id="lb-counter"></span>
</div>

<script>
const CLOUD_NAME='dok3udza0';
let photos=[];
let currentFilter='all';
let lbIdx=0;
let visible=[];

async function loadFromCloudinary(){
  try{
    const res=await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/portfolio.json`);
    const data=await res.json();
    photos=data.resources.map(r=>({
      src:`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_800,q_auto,f_auto/${r.public_id}`,
      cat:r.asset_folder||'',
      label:r.public_id.split('/').pop().split('_').slice(0,2).join(' '),
    }));
    const order=['Macro','Travel','Long-exposure'];
    photos.sort((a,b)=>order.indexOf(a.cat)-order.indexOf(b.cat));
  }catch(e){
    console.warn('Cloudinary load failed');
    photos=[];
  }
  buildGrid(currentFilter);
}

// SCROLL OBSERVER
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}});
},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});

function buildGrid(filter, instant=false){
  const order=['Macro','Travel','Long-exposure'];
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  visible=photos
    .filter(p=>filter==='all'||p.cat.toLowerCase()===filter.toLowerCase())
    .sort((a,b)=>order.indexOf(a.cat)-order.indexOf(b.cat));
  visible.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='photo-item';
    if(instant) div.classList.add('visible');
    const img=document.createElement('img');
    img.alt=p.label;
    img.onload=()=>img.classList.add('loaded');
    img.src=p.src;
    const overlay=document.createElement('div');
    overlay.className='photo-overlay';
    overlay.innerHTML=`<span class="photo-label">${p.label}</span>`;
    div.appendChild(img);
    div.appendChild(overlay);
    div.onclick=()=>openLb(i);
    visible[i]._el=div;
    grid.appendChild(div);
    if(!instant) observer.observe(div);
  });
}

function filterGallery(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildGrid(cat, true);
}

function openLb(i){
  lbIdx=i;
  const lb=document.getElementById('lightbox');
  const inner=lb.querySelector('.lightbox-inner');
  document.getElementById('lb-img').src=visible[i].src;
  document.getElementById('lb-counter').textContent=`${i+1} / ${visible.length}`;
  inner.style.transition='none';
  inner.style.opacity='0';
  inner.style.transform='scale(1)';
  lb.style.transition='none';
  lb.style.background='rgba(0,0,0,0)';
  lb.classList.add('open');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    inner.style.transition='opacity 0.35s ease';
    lb.style.transition='background 0.35s ease';
    inner.style.opacity='1';
    lb.style.background='rgba(0,0,0,0.96)';
  }));
}

function closeLb(){
  const lb=document.getElementById('lightbox');
  const inner=lb.querySelector('.lightbox-inner');
  inner.style.opacity='0';
  inner.style.transform='scale(0.92)';
  function toggleContact(){
  document.getElementById('contactPopup').classList.toggle('open');
}
document.addEventListener('click',e=>{
  const popup=document.getElementById('contactPopup');
  if(!popup.contains(e.target)&&e.target.textContent!=='Contact'){
    popup.classList.remove('open');
  }
});

// ANIMATED GRAIN
const grainCanvas=document.getElementById('grain-canvas');
const grainCtx=grainCanvas.getContext('2d');
function resizeGrain(){grainCanvas.width=window.innerWidth;grainCanvas.height=window.innerHeight}
resizeGrain();
window.addEventListener('resize',resizeGrain);
function animateGrain(){
  const w=grainCanvas.width,h=grainCanvas.height;
  const img=grainCtx.createImageData(w,h);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const v=Math.random()*255|0;
    d[i]=d[i+1]=d[i+2]=v;
    d[i+3]=255;
  }
  grainCtx.putImageData(img,0,0);
  requestAnimationFrame(animateGrain);
}
animateGrain();

// PARTICLES
const pCanvas=document.getElementById('particle-canvas');
const pCtx=pCanvas.getContext('2d');
function resizeParticles(){pCanvas.width=pCanvas.offsetWidth;pCanvas.height=pCanvas.offsetHeight}
resizeParticles();
window.addEventListener('resize',resizeParticles);

const PARTICLE_COUNT=80;
const particles=Array.from({length:PARTICLE_COUNT},()=>({
  x:Math.random()*pCanvas.width,
  y:Math.random()*pCanvas.height,
  r:Math.random()*1.5+0.3,
  vx:(Math.random()-0.5)*0.25,
  vy:(Math.random()-0.5)*0.25,
  o:Math.random()*0.4+0.1
}));

function animateParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=pCanvas.width;
    if(p.x>pCanvas.width)p.x=0;
    if(p.y<0)p.y=pCanvas.height;
    if(p.y>pCanvas.height)p.y=0;
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=`rgba(255,255,255,${p.o})`;
    pCtx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

setTimeout(()=>lb.classList.remove('open'),350);
}

function lbNav(dir){
  lbIdx=(lbIdx+dir+visible.length)%visible.length;
  const inner=document.querySelector('.lightbox-inner');
  const img=document.getElementById('lb-img');
  inner.style.transition='opacity 0.2s ease';
  inner.style.opacity='0';
  setTimeout(()=>{
    img.src=visible[lbIdx].src;
    document.getElementById('lb-counter').textContent=`${lbIdx+1} / ${visible.length}`;
    inner.style.opacity='1';
  },200);
}

function showPage(id){
  const tr=document.getElementById('transition');
  tr.style.transition='opacity 0.3s ease';
  tr.style.opacity='1';
  setTimeout(()=>{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
    document.getElementById('nav-'+id).classList.add('active');
    if(id==='gallery')buildGrid(currentFilter);
    if(id==='home'){
      const el=document.querySelector('#home .fade-in-el');
      el.classList.remove('visible');
      setTimeout(()=>el.classList.add('visible'),100);
    }
    window.scrollTo(0,0);
    tr.style.opacity='0';
  },320);
}

document.getElementById('lightbox').addEventListener('click',function(e){
  if(e.target===this)closeLb();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
});

setTimeout(()=>document.querySelector('#home .fade-in-el').classList.add('visible'),200);
loadFromCloudinary();
</script>
</body>
</html>
